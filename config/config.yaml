# 后端服务配置
backend:
  # 后端类型：standard(标准OpenAI), ptu(PTU Gateway), both(两者都启用)
  # - standard: 只使用标准 OpenAI 后端，忽略 PTU 配置
  # - ptu: 只使用 PTU 后端，所有请求都通过 PTU Gateway
  # - both: 根据模型名称自动选择（PTU 模型用 PTU，其他用标准后端）
  type: "ptu"

  # 后端模型服务地址（例如：http://127.0.0.1:8000）
  url: "https://api.ppchat.vip"

  # API Key（用于后端认证）
  api_key: "REMOVED_API_KEY"

  # 请求超时时间（秒）
  timeout: 600.0

  # HTTP 连接池配置
  max_connections: 100
  max_keepalive_connections: 20

# 代理服务配置
server:
  # 监听地址（0.0.0.0 表示监听所有网卡）
  host: "0.0.0.0"

  # 监听端口
  port: 8080

  # 日志级别（DEBUG, INFO, WARNING, ERROR, CRITICAL）
  log_level: "INFO"

# 路由配置
routes:
  # 是否启用 OpenAI 格式接口 /v1/chat/completions
  openai_enabled: true

  # 是否启用 Anthropic 格式接口 /v1/messages
  anthropic_enabled: true

# 模型配置
models:
