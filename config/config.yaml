# 后端服务配置
backend:
  # 后端模型服务地址（例如：http://127.0.0.1:8000）
  url: "http://127.0.0.1:8000"

  # 请求超时时间（秒）
  timeout: 600.0

  # HTTP 连接池配置
  max_connections: 100
  max_keepalive_connections: 20

# 代理服务配置
server:
  # 监听地址（0.0.0.0 表示监听所有网卡）
  host: "0.0.0.0"

  # 监听端口
  port: 8080

  # 日志级别（DEBUG, INFO, WARNING, ERROR, CRITICAL）
  log_level: "INFO"

# 路由配置
routes:
  # 是否启用 OpenAI 格式接口 /v1/chat/completions
  openai_enabled: true

  # 是否启用 Anthropic 格式接口 /v1/messages
  anthropic_enabled: true

# 模型配置
models:
  # 支持的模型列表
  # 每个模型包含：id（模型名称）、owned_by（所有者）、created（创建时间戳）
  available_models:
    - id: "gpt-4"
      owned_by: "openai"
      created: 1687882411
    - id: "gpt-4-turbo"
      owned_by: "openai"
      created: 1712361441
    - id: "gpt-3.5-turbo"
      owned_by: "openai"
      created: 1677610602
    - id: "claude-3-opus-20240229"
      owned_by: "anthropic"
      created: 1709251200
    - id: "claude-3-sonnet-20240229"
      owned_by: "anthropic"
      created: 1709251200
    - id: "claude-3-5-sonnet-20241022"
      owned_by: "anthropic"
      created: 1729641600
    - id: "o1-preview"
      owned_by: "openai"
      created: 1725494400
    - id: "o1-mini"
      owned_by: "openai"
      created: 1725494400
